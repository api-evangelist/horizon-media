aid: horizon-media
name: Horizon Media
description: >-
  Horizon Media is the largest independent media agency in the United States,
  founded in 1989 by Bill Koenigsberg and headquartered at 75 Varick Street in
  New York with offices in Los Angeles and Toronto. The agency employs roughly
  2,300+ people, is ranked the third largest US media agency by COMvergence,
  and manages an estimated $8.7 billion in billings. Horizon operates a
  portfolio of specialty units (Horizon Next for performance, Blue Hour Studios
  for social/creator, Night Market for retail media, Scout Sports for sponsorship
  via Horizon Sports & Experiences, and the WHY Group for cultural insights)
  and runs a proprietary data and AI stack anchored by the Blu platform. In
  2025 Horizon formed Horizon Global, a 50/50 US joint venture with Havas
  positioned at roughly $20 billion in combined billings, merging Blu with
  Havas Converged into a shared platform branded BluConverged, and is also
  building Horizon OS (Open Sphere) as an orchestration layer over the
  programmatic ad-tech stack. Horizon Media does not publish any public
  developer APIs, OpenAPI specifications, SDKs, or external developer portals,
  and its GitHub organization is private. All platforms documented here are
  internal/client-facing proprietary systems rather than open developer APIs.
