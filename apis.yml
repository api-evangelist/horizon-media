  - type: ProprietaryPlatform
    title: Blu
    url: https://www.horizonmedia.com/innovation
    description: >-
      Horizon's flagship connected marketing and AI platform. Originally
      launched in 2020 as an advanced data platform with machine learning,
      Blu has since evolved into a "transparent business consultancy"
      platform that analyzes business goals through a media lens, builds
      and analyzes custom audiences, runs competitive analysis, and answers
      strategic business questions. Architecturally Blu organizes data in
      a flat lattice structure for AI access, lists data sources and model
      details for transparency, operates inside each client's own cloud and
      data walls, taps multiple LLMs, and uses TransUnion data as a "data
      spine." Creative assembly, scoring, and generation are in pilot via
      APIs, MCPs, and agentic options.
  - type: ProprietaryPlatform
    title: BluConverged
    url: https://www.horizonmedia.com/innovation
    description: >-
      Joint AI and data platform created by merging Horizon's Blu with Havas's
      Converged marketing operating system, powering the Horizon Global JV.
  - type: ProprietaryPlatform
    title: Horizon OS (Open Sphere)
    url: https://www.horizonmedia.com/innovation
    description: >-
      Ad-tech orchestration and intelligence layer that sits above the
      programmatic stack, dynamically routing ad spend across DSPs, SSPs,
      verification, data, and measurement partners (Trade Desk, DV360,
      Amazon, Clearline, etc.) based on real-time performance signals.
      Horizon has issued RFIs to 200+ potential partners and is in active
      pilot integration. Monetization is on decision-making intelligence
      rather than inventory markups.
